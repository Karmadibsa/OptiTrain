<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optitrain - L'Optimisateur de Budget Transport</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-train-subway"></i> Optitrain</h1>
            <p class="subtitle">Arrête de payer trop cher tes allers-retours.</p>
        </header>

        <div class="calculator-grid">
            <!-- Configuration Panel -->
            <div class="card">
                <h2><i class="fa-solid fa-sliders"></i> Tes Tarifs & Planning</h2>

                <!-- ── Station search ───────────────────────────────────── -->
                <div class="station-section">
                    <div class="station-row">

                        <div class="station-group">
                            <label class="station-label">
                                <i class="fa-solid fa-circle-dot" style="color:#6366f1;font-size:.7rem"></i>
                                Départ
                            </label>
                            <div class="station-input-wrapper">
                                <input type="text" id="stationFrom"
                                       placeholder="Ex : Nancy"
                                       autocomplete="off" spellcheck="false">
                                <button class="btn-clear-station" id="clearFrom"
                                        onclick="clearStation('from')" style="display:none">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                                <div class="station-dropdown" id="dropdownFrom"></div>
                            </div>
                        </div>

                        <button class="btn-swap" onclick="swapStations()" title="Inverser les gares">
                            <i class="fa-solid fa-arrow-right-arrow-left"></i>
                        </button>

                        <div class="station-group">
                            <label class="station-label">
                                <i class="fa-solid fa-location-dot" style="color:#ec4899;font-size:.7rem"></i>
                                Arrivée
                            </label>
                            <div class="station-input-wrapper">
                                <input type="text" id="stationTo"
                                       placeholder="Ex : Metz-Ville"
                                       autocomplete="off" spellcheck="false">
                                <button class="btn-clear-station" id="clearTo"
                                        onclick="clearStation('to')" style="display:none">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                                <div class="station-dropdown" id="dropdownTo"></div>
                            </div>
                        </div>

                    </div>

                    <!-- Status line (auto-fill / not found / manual) -->
                    <div id="tariffStatus" class="tariff-status"></div>
                </div>

                <!-- ── Prix (auto-remplis ou manuels) ──────────────────── -->
                <div class="prices-grid">
                    <div class="input-group">
                        <label>
                            Mensuel
                            <span class="auto-badge" id="badgeMonth" style="display:none">auto</span>
                        </label>
                        <div class="price-input-container">
                            <input type="number" id="priceMonth" value="89" min="0" step="0.1">
                            <span class="currency-symbol">€</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>
                            Hebdo
                            <span class="auto-badge" id="badgeWeek" style="display:none">auto</span>
                        </label>
                        <div class="price-input-container">
                            <input type="number" id="priceWeek" value="25" min="0" step="0.1">
                            <span class="currency-symbol">€</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>
                            Jour
                            <span class="auto-badge" id="badgeDay" style="display:none">auto</span>
                        </label>
                        <div class="price-input-container">
                            <input type="number" id="priceDay" value="18" min="0" step="0.1">
                            <span class="currency-symbol">€</span>
                        </div>
                    </div>
                </div>

                <!-- ── Calendrier ───────────────────────────────────────── -->
                <div class="config-header">
                    <label style="margin:0">
                        Tes jours sur site
                        <span id="selectedCount" class="count-badge"></span>
                    </label>
                    <button class="btn-clear" onclick="clearAll()" id="clearBtn" style="display:none">
                        <i class="fa-solid fa-rotate-left"></i> Réinitialiser
                    </button>
                </div>

                <div class="calendar-nav">
                    <button class="btn-circle" onclick="prevMonth()">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <span id="calMonthLabel" class="cal-month-label"></span>
                    <button class="btn-circle" onclick="nextMonth()">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <div id="calendarGrid" class="calendar-grid"></div>

                <div class="cal-legend">
                    <div class="cal-legend-item">
                        <div class="cal-legend-dot"></div>Sélectionné
                    </div>
                    <div class="cal-legend-item">
                        <div class="cal-legend-dot dot-today"></div>Aujourd'hui
                    </div>
                    <div class="cal-legend-item">
                        <div class="cal-legend-dot dot-weekend"></div>Weekend
                    </div>
                </div>
            </div>

            <!-- Result Panel -->
            <div class="card result-box">
                <h2><i class="fa-solid fa-wallet"></i> Verdict</h2>
                <div style="margin-top: 1rem; flex-grow: 1;">
                    <div class="big-price" id="finalPrice">—</div>

                    <div id="recommendationText" class="recommendation-badge">
                        <i class="fa-regular fa-calendar-days"></i> Sélectionne tes gares et tes jours
                    </div>

                    <div class="comparison" style="margin-top: 1.5rem;">
                        <p>VS Abonnement Mensuel : <span id="monthlyCostDisplay">89€</span></p>
                        <p id="savingsText" style="color: var(--accent); margin-top: 5px; font-weight: bold;"></p>
                    </div>

                    <div id="funFact"
                        style="font-size: 0.85rem; font-style: italic; color: #818cf8; min-height: 1.2em;"></div>

                    <div id="detailsSection" class="details-section"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>Développé avec ❤️ pour les alternants fauchés.</p>
        </footer>
    </div>

    <!-- Data files loaded before script.js (disponibles en global) -->
    <script src="data/stations.js"></script>
    <script src="data/tariffs.js"></script>
    <script src="script.js"></script>
</body>

</html>
