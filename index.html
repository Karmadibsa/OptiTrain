<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optitrain - L'Optimisateur de Budget Transport</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-train-subway"></i> Optitrain</h1>
            <p class="subtitle">Arrête de payer trop cher tes allers-retours.</p>
        </header>

        <div class="calculator-grid">
            <!-- Configuration Panel -->
            <div class="card">
                <h2><i class="fa-solid fa-sliders"></i> Tes Tarifs & Planning</h2>

                <div class="prices-grid">
                    <div class="input-group">
                        <label>Mensuel</label>
                        <div class="price-input-container">
                            <input type="number" id="priceMonth" value="89">
                            <span class="currency-symbol">€</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Hebdo</label>
                        <div class="price-input-container">
                            <input type="number" id="priceWeek" value="25">
                            <span class="currency-symbol">€</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Jour</label>
                        <div class="price-input-container">
                            <input type="number" id="priceDay" value="18">
                            <span class="currency-symbol">€</span>
                        </div>
                    </div>
                </div>

                <div class="config-header">
                    <label style="margin:0">Ton agenda du mois (Jours sur site)</label>
                    <button class="add-week-btn" onclick="addWeek()"><i class="fa-solid fa-plus"></i> Semaine</button>
                </div>

                <div id="weeksContainer" class="weeks-container">
                    <!-- Weeks will be injected here via JS -->
                </div>
            </div>

            <!-- Result Panel -->
            <div class="card result-box">
                <h2><i class="fa-solid fa-wallet"></i> Verdict</h2>
                <div style="margin-top: 1rem; flex-grow: 1;">
                    <div class="big-price" id="finalPrice">0€</div>

                    <div id="recommendationText" class="recommendation-badge">
                        Calcul en cours...
                    </div>

                    <div class="comparison" style="margin-top: 1.5rem;">
                        <p>VS Abonnement Mensuel : <span id="monthlyCostDisplay">89€</span></p>
                        <p id="savingsText" style="color: var(--accent); margin-top: 5px; font-weight: bold;"></p>
                    </div>

                    <div id="funFact"
                        style="font-size: 0.85rem; font-style: italic; color: #818cf8; min-height: 1.2em;"></div>

                    <!-- Details Section (Always Visible) -->
                    <div id="detailsSection" class="details-section">
                        <!-- Details injected here via JS -->
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Développé avec ❤️ pour les alternants fauchés.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
